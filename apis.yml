aid: vannevar-labs
name: Vannevar Labs
description: >-
  Vannevar Labs is a defense technology company building agentic AI for
  national security and 21st-century conflict, pre-trained for intelligence
  missions. Its product portfolio spans open-source intelligence and document
  exploitation (Decrypt, Serra, TIE, Curator), maritime domain awareness
  (Revere, Foreshadow), information operations (Overwatch, Local), and mission
  augmentation (Telescope), deployed across U.S. military bases and partner
  forces. Vannevar Labs operates as a sales-led, ITAR-restricted defense
  vendor and does not publish a public developer portal or open APIs.
